    post:
      operationId: addClassBook
      tags: [classes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassBookInput"
      responses:
        "201":
          description: Added

  /classes/{id}/books/{bookId}:
    delete:
      operationId: removeClassBook
      tags: [classes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: bookId
          in: path
