          description: Students in class
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: addClassStudent
      tags: [classes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassStudentInput"
      responses:
        "201":
          description: Added

  /classes/{id}/students/{studentId}:
    delete:
      operationId: removeClassStudent
      tags: [classes]
      parameters:
